{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Recommendations</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'recommendations.css' %}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon"><i class="fas fa-graduation-cap"></i></span>
            <span class="brand-name">EnglishLearn</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'home' %}" class="nav-item"><i class="fas fa-book-open"></i><span>Home</span></a>
            <a href="{% url 'courses_menu' %}" class="nav-item" data-page="grammar">
                <i class="fas fa-spell-check"></i>
                <span>Grammar</span>
            </a>
            <a href="#" class="nav-item active"><i class="fas fa-bullseye"></i><span>Recommendations</span></a>
                            <a href="{% url 'profile' %}" class="nav-item" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </a>
            <a href="{% url 'configuration' %}" class="nav-item"><i class="fas fa-cog"></i><span>Configuration</span></a>
            <a href="{% url 'evaluation_welcome' %}" class="nav-item" data-page="Evaluation Test">
                <i class="fas fa-clipboard-check"></i>
                <span>Evaluation Test</span>
            </a>
        </nav>
    </aside>

    <div class="page">

        <header class="header">
            <h1>📚 Your Recommendations</h1>
            <p class="subtitle">Personalized content based on your level <span id="cefr-badge"></span></p>
        </header>

        <div class="tabs">
            <button class="tab active" data-type="vocabulary">🔤 Vocabulary</button>
            <button class="tab" data-type="grammar">📝 Grammar</button>
            <button class="tab" data-type="reading">📖 Reading</button>
            <button class="tab" data-type="tasks">✍️ Tasks</button>
        </div>

        <div class="content">
            <div id="loading" class="loading">Loading recommendations...</div>
            <div id="error"   class="error"   style="display:none"></div>

            <div id="section-vocabulary" class="section" style="display:none"></div>
            <div id="section-grammar"    class="section" style="display:none"></div>
            <div id="section-reading"    class="section" style="display:none"></div>
            <div id="section-tasks"      class="section" style="display:none"></div>
        </div>

    </div>

    <script src="{% static 'recommendations.js' %}"></script>
</body>
</html>
