<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reset Password | EnglishLearn</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'reset-request.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="reset-card">
            <div class="reset-header">
                <button class="back-btn" id="backBtn" aria-label="Go back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 class="reset-title">Reset password</h1>
                <div class="spacer"></div>
            </div>

            <p class="reset-subtitle">
                Enter your email address to receive a password reset link.
            </p>

            <form class="reset-form" id="resetForm">
                <div class="form-group">
                    <label for="emailInput" class="form-label">Email address</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="emailInput" name="email" class="form-input" placeholder="your@email.com" autocomplete="off" required>
                    </div>
                    <div class="input-hint">We'll send a reset link to this email</div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                    </svg>
                    Send reset link
                </button>
            </form>

            <!-- Pas de lien "Back to Sign in" -->
        </div>
    </div>

    <script src="{% static 'reset-request.js' %}"></script>
</body>
</html>
