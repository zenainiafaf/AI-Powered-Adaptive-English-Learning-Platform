<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password | EnglishLearn</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'reset-password.css' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="reset-card">
            <div class="reset-header">
                <button class="back-btn" id="backBtn" aria-label="Go back">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                </button>
                <h1 class="reset-title">New password</h1>
                <div class="spacer"></div>
            </div>

            <p class="reset-subtitle">
                Create a strong password for your account.
            </p>

            <form class="reset-form" id="resetForm">
                <!-- Token cachés récupérés de l'URL -->
                <input type="hidden" id="uidb64" name="uidb64">
                <input type="hidden" id="token" name="token">

                <div class="form-group">
                    <label for="passwordInput" class="form-label">New password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="passwordInput" name="password" class="form-input" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
                            <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- Indicateur de force -->
                    <div class="strength-meter">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div class="strength-text" id="strengthText">Enter at least 8 characters</div>
                </div>

                <div class="form-group">
                    <label for="confirmInput" class="form-label">Confirm password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="confirmInput" name="confirm_password" class="form-input" placeholder="••••••••" required>
                        <div class="match-indicator" id="matchIndicator"></div>
                    </div>
                </div>

                <div class="password-requirements" id="requirements">
                    <div class="req-item" id="req-length">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                        <span>At least 8 characters</span>
                    </div>
                    <div class="req-item" id="req-upper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                        <span>One uppercase letter</span>
                    </div>
                    <div class="req-item" id="req-lower">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                        <span>One lowercase letter</span>
                    </div>
                    <div class="req-item" id="req-number">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                        </svg>
                        <span>One number</span>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                    Update password
                </button>
            </form>
        </div>
    </div>

    <script src="{% static 'reset-password.js' %}"></script>
</body>
</html>
