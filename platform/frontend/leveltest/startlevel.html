<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Level Assessment</title>
    {% load static %}
<link rel="stylesheet" href="{% static 'startlevel.css' %}">
</head>
<body>
     <button class="btn-back" id="btn-back" title="Back">←</button>
    <div class="container">
        <div class="illustration">
            <div class="blob"></div>
            <div class="magnifying-glass">
                <div class="glass">
                    <div class="face">
                        <div class="hair"></div>
                        <div class="eyes">
                            <div class="eye"></div>
                            <div class="eye"></div>
                        </div>
                        <div class="mouth"></div>
                    </div>
                </div>
                <div class="handle"></div>
            </div>
        </div>
        
        <h1 class="title">Let's find the perfect level to start your learning journey</h1>
        
        <p class="subtitle">The questionnaire shouldn't take more than 15 minutes.</p>
        
        <button class="cta-button" id="startBtn">Find my level</button>
    </div>

     <!--- Modal "Quit the test? -->
    <div class="modal hidden" id="modal-quit">
        <div class="modal-content">
            <button class="btn-close-modal" id="btn-close-modal-start">✕</button>
            <h3>Quit the test?</h3>
            <p>Your progress will be lost. You will have to start over from the beginning.</p>
            <div class="modal-actions">
                <button class="btn-secondary" id="btn-restart-start">Restart test</button>
                <button class="btn-danger" id="btn-quit-start">Quit</button>
            </div>
        </div>
    </div>

    <script src="{% static 'startlevel.js' %}"></script>
</body>
</html>
